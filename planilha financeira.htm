<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner e Controle Financeiro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
    background: var(--bg-color, #fff8e7);
    color: var(--text-color, #444);
    font-size: var(--font-size, 16px);
  }
  header {
    display: flex;
    justify-content: space-around;
    background: #fbeaff;
    padding: 10px 0;
    border-bottom: 2px solid #f0d8ff;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header button {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    color: #6a4c93;
    font-weight: bold;
  }
  header button.active {
    color: #fff;
    background: #fcbad3;
    border-radius: 10px;
    padding: 5px 10px;
  }
  section { display: none; padding: 20px; }
  section.active { display: block; }

  /* Abas de meses */
  .month-tabs { display:flex; flex-wrap:wrap; margin-bottom:10px; }
  .month-tabs button { margin:2px; padding:5px 10px; border:none; border-radius:5px; cursor:pointer; background:#f0d8ff; color:#6a4c93; font-weight:bold; }
  .month-tabs button.active { background:#fcbad3; color:white; }

  /* Planner */
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); font-weight: bold; text-align: center; margin-bottom: 5px; }
  .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .day {
    background: #ffe6f2;
    border: 1px solid #f0d8ff;
    border-radius: 8px;
    padding: 15px 0;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
  }
  .day:hover { background: #fcbad3; color: white; }

  /* Modal */
  .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index:100; }
  .modal-content { background:white; padding:20px; border-radius:10px; width:90%; max-width:400px; box-shadow:0 4px 10px rgba(0,0,0,0.3); }
  .modal-content h3 { margin-top:0; text-align:center; }
  .modal-content input, .modal-content select, .modal-content button { width:100%; margin:5px 0; padding:8px; border-radius:5px; border:1px solid #ddd; font-size:14px; }
  .modal-content button { background: var(--btn-color,#ffd6e8); border:none; cursor:pointer; }
  .modal-content button:hover { background: var(--btn-hover-color,#fcbad3); color:white; }

  /* Financeiro */
  form { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap:5px; margin-bottom:15px; }
  table { width:100%; border-collapse: collapse; text-transform: lowercase; }
  th, td { padding:10px; border-bottom:1px solid #eee; text-align:center; }
  th { background: #e0d4f7; color:#4b3b6b; }
  .remove-btn { background: var(--btn-color,#ff7f7f); color:white; border:none; padding:3px 6px; border-radius:5px; cursor:pointer; }
  .remove-btn:hover { background: var(--btn-hover-color,#ff4c4c); }

  /* Config */
  .config-option { margin:10px 0; }
</style>
</head>
<body>

<header>
  <button class="active" onclick="showSection('planner')">Planner Mensal</button>
  <button onclick="showSection('financeiro')">Finanças</button>
  <button onclick="showSection('config')">Configurações</button>
</header>

<section id="planner" class="active">
  <h2>🌸 Planner Mensal 🌸</h2>
  <div class="month-tabs" id="plannerMonthTabs"></div>
  <div class="weekdays">
    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
  </div>
  <div class="calendar" id="calendar"></div>
</section>

<section id="financeiro">
  <h2>🌸 Controle Financeiro 🌸</h2>
  <div class="month-tabs" id="financeMonthTabs"></div>
  <form id="financeForm">
    <input type="text" id="desc" placeholder="Descrição" required>
    <input type="number" id="valor" placeholder="Valor" step="0.01" required>
    <select id="tipo">
      <option value="receita">Receita</option>
      <option value="despesa">Despesa</option>
    </select>
    <select id="categoria"></select>
    <button type="submit">Adicionar</button>
  </form>

  <h4>Gerenciar categorias:</h4>
  <input type="text" id="newCategory" placeholder="Nova categoria">
  <button onclick="addCategory()">Adicionar Categoria</button>

  <table>
    <thead>
      <tr><th>Descrição</th><th>Valor</th><th>Tipo</th><th>Categoria</th><th>Ações</th></tr>
    </thead>
    <tbody id="financeTable"></tbody>
  </table>
  <h3>Saldo: R$ <span id="saldo">0.00</span></h3>
  <h3>Despesas por Categoria</h3>
  <canvas id="despesaChart" style="max-width:400px; margin:20px auto; display:block;"></canvas>
</section>

<section id="config">
  <h2>🌸 Configurações 🌸</h2>
  <div class="config-option">
    <label>Cor de fundo: </label>
    <input type="color" id="bgColorPicker" value="#fff8e7">
  </div>
  <div class="config-option">
    <label>Cor do texto: </label>
    <input type="color" id="textColorPicker" value="#444444">
  </div>
  <div class="config-option">
    <label>Cor dos dias do planner: </label>
    <input type="color" id="dayColorPicker" value="#ffe6f2">
  </div>
  <div class="config-option">
    <label>Tamanho da fonte: </label>
    <input type="number" id="fontSizePicker" value="16" min="10" max="30"> px
  </div>
  <div class="config-option">
    <label>Cor dos botões: </label>
    <input type="color" id="btnColorPicker" value="#ffd6e8">
  </div>
  <div class="config-option">
    <label>Cor do hover dos botões: </label>
    <input type="color" id="btnHoverColorPicker" value="#fcbad3">
  </div>
</section>

<div class="modal" id="taskModal">
  <div class="modal-content">
    <h3 id="taskTitle"></h3>
    <input type="text" id="newTaskInput" placeholder="Nova tarefa">
    <input type="time" id="newTaskTime">
    <button onclick="addTask()">Adicionar Tarefa</button>
    <ul id="taskList"></ul>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>

<script>
  // ---------------- Navegação ----------------
  function showSection(id){
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.querySelectorAll("header button").forEach(b=>b.classList.remove("active"));
    document.querySelector(`header button[onclick*="${id}"]`).classList.add("active");
  }

  const months = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const today = new Date();

  // ---------------- Planner ----------------
  const plannerMonthTabs = document.getElementById("plannerMonthTabs");
  const calendar = document.getElementById("calendar");
  let plannerCurrentMonth = today.getMonth();
  let tasks = JSON.parse(localStorage.getItem("tasks"))||{};

  months.forEach((m,i)=>{
    const btn=document.createElement("button");
    btn.textContent=m;
    if(i===plannerCurrentMonth) btn.classList.add("active");
    btn.onclick=()=>{ 
      plannerCurrentMonth=i;
      document.querySelectorAll("#plannerMonthTabs button").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      renderCalendar();
    };
    plannerMonthTabs.appendChild(btn);
  });

  function renderCalendar(){
    calendar.innerHTML="";
    const year=today.getFullYear();
    const daysInMonth=new Date(year,plannerCurrentMonth+1,0).getDate();
    for(let i=1;i<=daysInMonth;i++){
      const day=document.createElement("div");
      day.classList.add("day");
      day.textContent=i;
      day.onclick=()=>openModal(i);
      calendar.appendChild(day);
    }
    aplicarCores();
  }
  renderCalendar();

  let currentDay=null;
  function openModal(day){
    currentDay=day;
    document.getElementById("taskTitle").textContent=`Dia ${day}`;
    renderTasks();
    document.getElementById("taskModal").style.display="flex";
  }
  function closeModal(){ document.getElementById("taskModal").style.display="none"; }

  function addTask(){
    const desc=document.getElementById("newTaskInput").value.trim();
    const time=document.getElementById("newTaskTime").value;
    if(!desc || !time) return;
    if(!tasks[plannerCurrentMonth]) tasks[plannerCurrentMonth]={};
    if(!tasks[plannerCurrentMonth][currentDay]) tasks[plannerCurrentMonth][currentDay]=[];
    tasks[plannerCurrentMonth][currentDay].push({desc,time});
    tasks[plannerCurrentMonth][currentDay].sort((a,b)=>a.time.localeCompare(b.time));
    localStorage.setItem("tasks",JSON.stringify(tasks));
    document.getElementById("newTaskInput").value="";
    document.getElementById("newTaskTime").value="";
    renderTasks();
  }

  function renderTasks(){
    const list=document.getElementById("taskList");
    list.innerHTML="";
    const dayTasks=tasks[plannerCurrentMonth]?.[currentDay]||[];
    dayTasks.forEach((t,i)=>{
      const li=document.createElement("li");
      li.textContent=`[${t.time}] ${t.desc}`;
      const btn=document.createElement("button");
      btn.textContent="Remover";
      btn.style.marginLeft="5px";
      btn.onclick=()=>{ dayTasks.splice(i,1); localStorage.setItem("tasks",JSON.stringify(tasks)); renderTasks(); };
      li.appendChild(btn);
      list.appendChild(li);
    });
  }

  // ---------------- Financeiro ----------------
  const financeMonthTabs = document.getElementById("financeMonthTabs");
  let financeCurrentMonth = today.getMonth();
  let registros = JSON.parse(localStorage.getItem("registros"))||{};
  let saldoData = JSON.parse(localStorage.getItem("saldoData"))||{};
  let categorias = JSON.parse(localStorage.getItem("categorias"))||["Alimentação","Transporte","Lazer","Saúde","Educação","Outros"];
  let categoriaColors = JSON.parse(localStorage.getItem("categoriaColors"))||["#fcbad3","#e0d4f7","#ffd6e8","#ffa6c1","#f7d4f0","#d4a5f7","#ffb3d9","#ffcce7","#f7c6d9","#e8b0f7"];
  const categoriaSelect=document.getElementById("categoria");
  let despesaChart;

  months.forEach((m,i)=>{
    const btn=document.createElement("button");
    btn.textContent=m;
    if(i===financeCurrentMonth) btn.classList.add("active");
    btn.onclick=()=>{
      financeCurrentMonth=i;
      document.querySelectorAll("#financeMonthTabs button").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      atualizarFinanceiro();
    };
    financeMonthTabs.appendChild(btn);
  });

  function atualizarCategoriaSelects(){
    categoriaSelect.innerHTML='<option value="">Categoria (opcional)</option>';
    categorias.forEach(cat=>{
      const opt=document.createElement("option"); opt.value=cat; opt.textContent=cat; categoriaSelect.appendChild(opt);
    });
    localStorage.setItem("categorias", JSON.stringify(categorias));
    localStorage.setItem("categoriaColors", JSON.stringify(categoriaColors));
  }
  atualizarCategoriaSelects();

  function addCategory(){
    const newCat=document.getElementById("newCategory").value.trim();
    if(newCat && !categorias.includes(newCat)){
      categorias.push(newCat);
      categoriaColors.push(getRandomPastelColor());
      atualizarCategoriaSelects();
      document.getElementById("newCategory").value='';
      atualizarFinanceiro();
    }
  }

  function getRandomPastelColor(){ const hue=Math.floor(Math.random()*360); return `hsl(${hue},70%,85%)`; }

function atualizarFinanceiro(){
    const monthKey = financeCurrentMonth;
    registros[monthKey] = registros[monthKey] || [];
    saldoData[monthKey] = saldoData[monthKey] || 0;

    const financeTable=document.getElementById("financeTable");
    const saldoSpan=document.getElementById("saldo");
    financeTable.innerHTML="";

    const catDespesa={};
    registros[monthKey].forEach((r,i)=>{
      const tr=document.createElement("tr");
      tr.innerHTML=`<td>${r.desc}</td><td>R$ ${r.valor.toFixed(2)}</td><td>${r.tipo}</td><td>${r.categoria||"-"}</td>
                      <td><button class="remove-btn" onclick="removerRegistro(${i})">Remover</button></td>`;
      financeTable.appendChild(tr);

      if(r.tipo==="despesa"){
        const cat = r.categoria || "Sem categoria";
        catDespesa[cat] = (catDespesa[cat]||0)+r.valor;
      }
    });

    saldoData[monthKey] = registros[monthKey].reduce((acc,r)=>acc+(r.tipo==="receita"?r.valor:-r.valor),0);
    saldoSpan.textContent=saldoData[monthKey].toFixed(2);

    localStorage.setItem("registros", JSON.stringify(registros));
    localStorage.setItem("saldoData", JSON.stringify(saldoData));

    // Gráfico
    const ctx=document.getElementById('despesaChart').getContext('2d');
    const labels = Object.keys(catDespesa).length ? Object.keys(catDespesa) : ['Sem despesas'];
    const dataValues = Object.keys(catDespesa).length ? Object.values(catDespesa) : [1];
    const colors = Object.keys(catDespesa).map(cat => categoriaColors[categorias.indexOf(cat)] || getRandomPastelColor());

    if(despesaChart) despesaChart.destroy();
    despesaChart=new Chart(ctx,{
      type:'pie',
      data:{labels:labels, datasets:[{data:dataValues, backgroundColor:colors}]},
      options:{plugins:{tooltip:{callbacks:{label:function(context){
        const total=context.dataset.data.reduce((a,b)=>a+b,0);
        const value=context.raw;
        const percent=((value/total)*100).toFixed(1);
        return `${context.label}: R$ ${value.toFixed(2)} (${percent}%)`;
      }}}}}
    });
}

  function removerRegistro(index){
    registros[financeCurrentMonth].splice(index,1);
    atualizarFinanceiro();
  }

  document.getElementById("financeForm").onsubmit = e=>{
    e.preventDefault();
    const desc=document.getElementById("desc").value;
    const valor=parseFloat(document.getElementById("valor").value);
    const tipo=document.getElementById("tipo").value;
    const categoria=document.getElementById("categoria").value;
    registros[financeCurrentMonth].push({desc,valor,tipo,categoria});
    atualizarFinanceiro();
    document.getElementById("financeForm").reset();
  };
  atualizarFinanceiro();

  // ---------------- Configurações ----------------
  const bgColorPicker=document.getElementById("bgColorPicker");
  const textColorPicker=document.getElementById("textColorPicker");
  const dayColorPicker=document.getElementById("dayColorPicker");
  const fontSizePicker=document.getElementById("fontSizePicker");
  const btnColorPicker=document.getElementById("btnColorPicker");
  const btnHoverColorPicker=document.getElementById("btnHoverColorPicker");

  function aplicarCores(){
    document.body.style.setProperty("--bg-color",localStorage.getItem("bgColor")||"#fff8e7");
    document.body.style.setProperty("--text-color",localStorage.getItem("textColor")||"#444");
    document.body.style.setProperty("--font-size",localStorage.getItem("fontSize")||16+"px");
    document.querySelectorAll(".day").forEach(d=>d.style.background=localStorage.getItem("dayColor")||"#ffe6f2");
    document.body.style.setProperty("--btn-color",localStorage.getItem("btnColor")||"#ffd6e8");
    document.body.style.setProperty("--btn-hover-color",localStorage.getItem("btnHoverColor")||"#fcbad3");
  }
  aplicarCores();

  [bgColorPicker,textColorPicker,dayColorPicker,fontSizePicker,btnColorPicker,btnHoverColorPicker].forEach(input=>{
    input.addEventListener("input",()=>{
      if(input===bgColorPicker) localStorage.setItem("bgColor",input.value);
      if(input===textColorPicker) localStorage.setItem("textColor",input.value);
      if(input===dayColorPicker) localStorage.setItem("dayColor",input.value);
      if(input===fontSizePicker) localStorage.setItem("fontSize",input.value);
      if(input===btnColorPicker) localStorage.setItem("btnColor",input.value);
      if(input===btnHoverColorPicker) localStorage.setItem("btnHoverColor",input.value);
      aplicarCores();
    });
  });
</script>
</body>
</html>
