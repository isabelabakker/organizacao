<!DOCTYPE html>
<html lang="pt-br">

<head>

  <link rel="icon" type="image/png" href="icon.png"> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrganizatIO</title>

  <style>

      /* ... (restante dos seus estilos) ... */
    
    /* ------------------------------------------------ */
    /* CORREÇÃO PARA O TÍTULO PRINCIPAL */
    /* ------------------------------------------------ */
    #mensal-page-title {
        /* Define a transformação de texto para "nenhuma",
           permitindo letras maiúsculas/minúsculas normalmente */
        text-transform: none; 
    }
    
    /* ------------------------------------------------ */
    /* ESTILOS TEMA CLARO (Padrão) - CORES VIVAS */
    /* ------------------------------------------------ */
    body {
      font-family: Arial, sans-serif;
      background: #F0F2F5; /* Fundo claro e limpo */
      color: #333; /* Texto escuro padrão */
      display: flex;
      height: 100vh;
      margin: 0;
      transition: background 0.3s, color 0.3s; /* Transição suave */
      text-transform: lowercase; /* Força todo o corpo para minúsculas */
    }
    .sidebar {
      width: 220px;
      background: #E8F0FE; /* Sidebar em azul claro vibrante */
      padding: 20px;
      border-right: 2px solid #dadada;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: background 0.3s, border-color 0.3s;
    }
    .sidebar button {
      background: #3d71ff; /* Azul elétrico para botões não selecionados */
      border: none;
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
      text-align: left;
      text-transform: lowercase; 
      color: white;
    }
    .sidebar button:hover {
      background: #3d71ff; /* Azul elétrico mais forte no hover */
    }
    /* Botões principais (planner, financeiro, listas) */
    .mensal-sub-toggle {
        background: #3586ff; /* Azul elétrico para não selecionado */
        border: none;
        border-radius: 8px;
        padding: 8px 15px;
        cursor: pointer;
        color: white;
        transition: 0.2s;
        text-transform: lowercase;
    }
    .mensal-sub-toggle:hover {
        background: #3d71ff; /* Azul elétrico mais forte no hover */
    }
    .mensal-sub-toggle.active-sub {
        background: #3d71ff; /* Ciano vibrante para botão selecionado */
        font-weight: bold;
        color: white; 
    }
    
    .container {
      flex: 1;
      background: #FFFFFF; /* Container branco */
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin: 20px;
      padding: 20px;
      overflow-y: auto;
      transition: background 0.3s, box-shadow 0.3s;
    }
    h1, h2, h3 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
      text-transform: lowercase; 
      transition: color 0.3s;
    }
    
    /* Layout do formulário financeiro */
    form#expense-form {
      display: grid;
      /* data, desc, tipo, categoria, valor, grupo de botões (o último slot) */
      grid-template-columns: 1fr 2fr 1fr 1fr 1fr auto; 
      gap: 10px;
      margin-bottom: 20px;
    }
    
    input, select, button {
      padding: 8px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
      text-transform: lowercase; 
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }
    
    /* Estilo para o grupo de botões de Adicionar/Salvar/Cancelar */
    .add-btn-group {
        display: flex;
        gap: 5px;
    }
    .add-btn-group button {
        flex-grow: 1;
    }
    
    /* ALTERAÇÃO 3: Cor do botão "adicionar" mudada para o azul principal */
    button.add-btn {
      background: #3586ff; /* NOVO: Azul dos botões principais */
      border: none;
      cursor: pointer;
      color: white;
      transition: 0.2s;
    }
    button.add-btn:hover {
      background: #3d71ff; /* Azul mais forte no hover */
    }
    /* Estilo para o botão "Salvar Edição" */
    button.add-btn[type="submit"]:not(.add-btn) { 
        background: #4CAF50; /* Verde vibrante para salvar */
        color: white; 
    }
    
    /* Estilo para o botão de gerenciar categorias */
    #manage-categories-btn {
        background: #9E9E9E; /* Cinza médio vibrante */
        color: white; 
        border: none;
        padding: 8px 15px;
        border-radius: 10px;
        cursor: pointer;
        text-align: center;
        flex-grow: 1; 
        transition: background 0.2s;
    }
    #manage-categories-btn:hover {
        background: #757575; /* Cinza mais escuro no hover */
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      text-transform: lowercase;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }
    th {
      background: #E0F2F7; /* Azul claro suave para cabeçalho da tabela */
      color: #333;
      transition: background 0.3s, color 0.3s;
    }
    tr:hover {
      background: #F5F5F5;
    }
    .total {
      text-align: right;
      font-weight: bold;
      margin-top: 10px;
      color: #333;
      transition: color 0.3s;
    }
    .delete-btn, .edit-btn { /* Estilos para botões da tabela */
      border: none;
      border-radius: 8px;
      padding: 5px 10px;
      cursor: pointer;
      color: white;
      margin: 0 2px;
    }
    .delete-btn {
      background: #FF5252; /* Vermelho vibrante para excluir */
    }
    .delete-btn:hover {
      background: #FF1744; /* Vermelho mais forte */
    }
    .edit-btn {
        background: #4CAF50; /* Verde vibrante para editar */
        color: white; 
    }
    .edit-btn:hover {
        background: #388E3C; /* Verde mais escuro */
    }
    
    #charts-dual-container {
        display: flex;
        justify-content: space-around;
        flex-wrap: wrap; 
        margin-top: 30px;
    }
    
    #month-chart-container {
        width: 100%; 
        max-width: 300px; 
        margin-bottom: 20px;
    }
    
    #annual-chart-container {
        width: 100%; 
        max-width: 500px;
    }
    
    /* estilos para gerenciador de listas */
    .new-list {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
      gap: 10px;
    }
    .lists-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: flex-start;
    }
    .list {
      background: #fff; 
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      width: 250px;
      transition: opacity 0.3s ease, background 0.3s; 
      flex-shrink: 0;
    }
    
    /* NOVO ESTILO: Container para o Input e Botão de Adicionar Item */
    .list-input-group {
        display: flex; 
        gap: 5px; 
        margin-bottom: 10px;
    }
    .list-input-group input {
        flex-grow: 1; /* Faz o input ocupar o espaço restante */
        margin-bottom: 0;
    }
    /* FIM NOVO ESTILO */

    /* NOVO ESTILO: Lista Concluída */
    .list.completed {
        opacity: 0.6; /* Efeito de apagamento */
    }

    /* ALTERAÇÃO 2: Estilo para o botão de remover lista (circular) */
    .delete-list-circular-btn {
        background: #FF5252; /* Vermelho vibrante para excluir */
        border: none;
        cursor: pointer;
        color: white;
        
        /* Formato Circular e Tamanho */
        border-radius: 50%; /* Transforma o quadrado em círculo */
        width: 24px; 
        height: 24px; 
        padding: 0; 
        display: inline-flex; 
        justify-content: center;
        align-items: center;
        font-size: 14px; 
        line-height: 1;
        flex-shrink: 0;
        margin-left: 5px; 
        vertical-align: middle; /* Alinha o botão com o texto do h2 */
        
        transition: background 0.2s;
    }
    .delete-list-circular-btn:hover {
        background: #FF1744; 
    }
    
    /* estilos para o calendário */
    #calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    .calendar-day-name {
      text-align: center;
      font-weight: bold;
      padding: 10px 0;
      background: #E0F2F7; /* Azul claro suave para nomes dos dias */
      border-radius: 5px;
      text-transform: lowercase;
      font-size: 12px;
      transition: background 0.3s;
    }
    
    /* ALTERAÇÃO 1: Borda cinza para o tema claro */
    .calendar-day {
      background: #fff; 
      border: 1px solid #e6e5e5; /* NOVO: Cinza para tema claro */
      border-radius: 5px;
      padding: 10px 5px;
      min-height: 80px;
      text-align: left;
      vertical-align: top;
      transition: background 0.2s, border-color 0.3s;
      cursor: pointer; 
      position: relative;
      overflow: hidden; 
    }
    .calendar-day:hover:not(.inactive) {
      background: #E8F0FE; /* Azul claro vibrante no hover do dia */
    }
    .calendar-day.inactive {
      background: #F9F9F9;
      color: #bbb;
      border: 1px dashed #eee;
      cursor: default;
    }
    .calendar-day-number {
      font-size: 18px;
      font-weight: bold;
      color: #9C27B0; /* Roxo vibrante para números dos dias */
      display: block;
      margin-bottom: 5px;
      transition: color 0.3s;
    }
    .task-indicator {
      font-size: 10px;
      color: white;
      background: #ff8f5b; /* rosa para tarefas */
      padding: 1px 4px;
      border-radius: 3px;
      margin-top: 2px;
      display: inline-block;
      max-width: 90%;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    /* ---------------- MODAL STYLES ---------------- */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.4);
    }
    .modal-content {
      background-color: #fefefe;
      margin: 15% auto;
      padding: 20px;
      border: 1px solid #888;
      width: 80%;
      max-width: 500px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }
    .close-button {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      text-transform: none; 
    }
    .close-button:hover, .close-button:focus {
      color: #000;
      text-decoration: none;
      cursor: pointer;
    }
    .task-form {
      display: grid;
      grid-template-columns: 1fr 3fr auto;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }
    .task-list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      transition: border-color 0.3s;
    }
    .task-list-item button {
      background: #FF5252; /* Vermelho vibrante para remover tarefa */
      color: white;
      border: none;
      padding: 5px 8px;
      border-radius: 5px;
      cursor: pointer;
    }
    
    /* Estilos específicos do Modal de Categorias (Aplicados a ambas as listas) */
    #expense-category-list-container div,
    #revenue-category-list-container div {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px 0;
        border-bottom: 1px solid #eee;
    }
    #expense-category-list-container button,
    #revenue-category-list-container button {
        background: #FF5252; /* Vermelho vibrante para remover categoria */
        padding: 3px 8px;
        font-size: 12px;
    }

    /* ------------------------------------------------ */
    /* ESTILOS TEMA ESCURO - CORES VIVAS */
    /* ------------------------------------------------ */
    body.dark-mode {
      background: #121212; 
      color: #E0E0E0; 
    }

    body.dark-mode .sidebar {
      background: #1F1F1F; 
      border-right: 2px solid #333333;
    }
    body.dark-mode .sidebar button {
        background: #3d71ff; /* Azul escuro vibrante para botões não selecionados */
    }
    body.dark-mode .sidebar button:hover {
        background: #3d71ff; /* Azul escuro mais forte no hover */
    }
    
    /* ALTERAÇÃO 1 (Continuação): Borda cinza para o tema escuro */
    body.dark-mode .container,
    body.dark-mode .list,
    body.dark-mode .calendar-day,
    body.dark-mode hr {
      background: #1F1F1F; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      border-color: #666 !important; /* NOVO: Cinza para bordas em tema escuro */
    }

    body.dark-mode h1,
    body.dark-mode h2,
    body.dark-mode h3,
    body.dark-mode .total,
    body.dark-mode .close-button {
      color: #FFFFFF;
    }
    
    /* NOVO ESTILO: Lista Concluída em Dark Mode */
    body.dark-mode .list.completed {
        opacity: 0.4; 
    }

    body.dark-mode th {
      background: #333333; 
      color: #E0E0E0;
    }

    body.dark-mode tr:hover {
      background: #282828;
    }
    
    body.dark-mode .task-list-item {
      border-bottom: 1px solid #333;
    }

    body.dark-mode input,
    body.dark-mode select,
    body.dark-mode .modal-content input,
    body.dark-mode .modal-content select,
    body.dark-mode .list input[type="text"],
    body.dark-mode button:not(.delete-btn):not(.edit-btn):not(.sidebar button):not(.mensal-sub-toggle):not(.delete-list-circular-btn) { /* Incluindo a nova classe */
      background: #282828;
      border: 1px solid #555;
      color: #E0E0E0;
    }
    
    /* ALTERAÇÃO 3 (Continuação): Cor do botão "adicionar" em dark mode */
    body.dark-mode button.add-btn {
        background: #6b9aff; /* NOVO: Azul dos botões principais em dark mode */
        color: white; 
    }
    body.dark-mode button.add-btn:hover {
        background: #558bff; /* Azul mais forte no hover em dark mode */
    }
    
    /* ALTERAÇÃO 2 (Continuação): Estilo circular em Dark Mode */
    body.dark-mode .delete-list-circular-btn {
      background: #D50000; /* Vermelho escuro para dark mode */
    }
    body.dark-mode .delete-list-circular-btn:hover {
      background: #C60000; /* Vermelho mais escuro no hover */
    }

    body.dark-mode .mensal-sub-toggle {
        background: #6b9aff; /* Azul escuro vibrante para não selecionado em dark mode */
        color: white;
    }
    body.dark-mode .mensal-sub-toggle.active-sub {
        background: #558bff; /* Ciano escuro vibrante para selecionado em dark mode */
        color: white;
    }
    
    /* DARK MODE: Botão de Gerenciar Categorias */
    body.dark-mode #manage-categories-btn {
        background: #616161; /* Cinza mais escuro vibrante */
        color: white;
    }
    body.dark-mode #manage-categories-btn:hover {
        background: #424242; /* Cinza ainda mais escuro */
    }
    
    body.dark-mode .calendar-day-name {
      background: #333333;
      color: #E0E0E0;
    }

    body.dark-mode .calendar-day:hover:not(.inactive) {
      background: #282828;
    }

    body.dark-mode .calendar-day.inactive {
      background: #1A1A1A;
      color: #666;
      border: 1px dashed #333;
      cursor: default;
    }

    body.dark-mode .calendar-day-number {
      color: #8d1ce9; /* Roxo mais escuro para números dos dias em dark mode */
    }
    
    body.dark-mode .modal-content {
        background-color: #1E1E1E;
        border: 1px solid #333;
        color: #E0E0E0;
    }
    
    body.dark-mode .edit-btn {
        background: #2E7D32; /* Verde escuro para editar em dark mode */
        color: white; 
    }
    body.dark-mode .edit-btn:hover {
        background: #1B5E20; /* Verde ainda mais escuro */
    }
    
    body.dark-mode .sidebar button#theme-toggle {
        background: #616161; /* Cinza escuro para botão de tema em dark mode */
        color: white; 
    }
    /* ------------------------------------------------ */

  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="sidebar">
    <button id="theme-toggle" style="background: #9E9E9E; margin-top: auto; color: white;">🌙 tema</button>
  </div>

  <div class="container">
    
    <div id="mensal-page">
        <h1 id="mensal-page-title">
          
          OrganizatIO</h1>

        <div id="mensal-controls" style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px;">
            <select id="calendar-month-select" style="padding: 8px; border-radius: 8px; text-transform: lowercase; font-size: 14px; border-color: #6A8EFE;"></select>
            
            <button id="show-planner" class="mensal-sub-toggle active-sub">planner</button>
            <button id="show-financeiro" class="mensal-sub-toggle">financeiro</button>
            <button id="show-listas" class="mensal-sub-toggle">listas</button>
        </div>
        
        <hr style="border-top: 1px solid #ddd; margin: 30px 0;">


        <div id="planner-section" class="mensal-content-section">
            <h2 style="text-align: center; margin-bottom: 20px;">planner</h2>
            <div id="calendar-grid">
                </div>
        </div>
        

        <div id="financeiro-section" class="mensal-content-section" style="display: none;">
            <h2 style="text-align: center; margin-bottom: 20px;">controle financeiro</h2>
            
            <form id="expense-form">
                <input type="date" id="date" required>
                <input type="text" id="desc" placeholder="descrição" required>
                
                <select id="type">
                  <option value="despesa">despesa</option>
                  <option value="receita">receita</option>
                </select>
                
                <select id="category" placeholder="categoria"> 
                  </select>
                
                <input type="number" id="value" placeholder="r$" step="0.01" required>
                
                <div class="add-btn-group">
                    <button type="submit" class="add-btn" id="submit-expense-btn">adicionar</button>
                    <button type="button" id="manage-categories-btn">🛠️ categorias</button>
                </div>
            </form>
            
            <table id="expense-table">
                <thead>
                  <tr>
                    <th>data</th>
                    <th>descrição</th>
                    <th>categoria</th>
                    <th>tipo</th> 
                    <th>valor (r$)</th>
                    <th>ações</th>
                  </tr>
                </thead>
                <tbody id="expense-list"></tbody>
            </table>

            <div class="total" id="total-container">
                saldo total: r$ <span id="total">0.00</span>
            </div>

            <div id="charts-dual-container">
                <div id="month-chart-container">
                    <h3 style="text-align: center; margin-top: 0;">gastos por categoria</h3> 
                    <canvas id="month-chart"></canvas>
                </div>
                
                <div id="annual-chart-container">
                    <h3 style="text-align: center; margin-top: 0;">comparativo anual</h3>
                    <canvas id="annual-chart"></canvas>
                </div>
            </div>
        </div>

        <div id="listas-section" class="mensal-content-section" style="display: none;">
            <h2 style="text-align: center; margin-bottom: 20px;">gerenciador de listas</h2>
            <div class="new-list">
                <input type="text" id="newListName" placeholder="nome da nova lista">
                <button id="createListButton">criar lista</button>
            </div>
            <div class="lists-container" id="listsContainer"></div>
        </div>

    </div>
    </div>

  <div id="taskModal" class="modal">
    <div class="modal-content">
      <span class="close-button" onclick="closeTaskModal()">&times;</span>
      
      <h3>adicionar tarefa</h3>
      <div class="task-form">
        <input type="time" id="taskTime" value="09:00">
        <input type="text" id="taskDescription" placeholder="descrição da tarefa" required>
        <button onclick="addTask()">adicionar</button>
      </div>

      <h3>tarefas do dia</h3>
      <div id="tasksList">
        </div>
    </div>
  </div>
  
  <div id="categoryModal" class="modal">
    <div class="modal-content">
      <span class="close-button" onclick="closeCategoryModal()">&times;</span>
      
      <h3>gerenciar categorias</h3>
      
      <div style="display: flex; gap: 10px; margin-bottom: 20px; align-items: center;">
        <select id="newCategoryType" style="padding: 8px; border-radius: 10px; border: 1px solid #ccc;">
          <option value="despesa">despesa</option>
          <option value="receita">receita</option>
        </select>
        <input type="text" id="newCategoryName" placeholder="nome da nova categoria" style="flex-grow: 1;">
        <button id="addCategoryButton" class="add-btn">adicionar</button>
      </div>
      
      <h4>categorias de despesa</h4>
      <div id="expense-category-list-container">
        </div>
      
      <hr style="border-top: 1px solid #ddd; margin: 15px 0;">

      <h4>categorias de receita</h4>
      <div id="revenue-category-list-container">
        </div>
    </div>
  </div>


  <script>
    const form = document.getElementById('expense-form');
    const expenseList = document.getElementById('expense-list');
    const totalEl = document.getElementById('total');
    
    // Elementos do Formulário Financeiro
    const dateInput = document.getElementById('date');
    const descInput = document.getElementById('desc');
    const categoryInput = document.getElementById('category');
    const typeInput = document.getElementById('type'); 
    const valueInput = document.getElementById('value');
    const submitButton = document.getElementById('submit-expense-btn');
    const buttonGroup = document.querySelector('.add-btn-group');
    
    // Elementos de Gerenciamento de Categorias
    const manageCategoriesBtn = document.getElementById('manage-categories-btn'); 
    const categoryModal = document.getElementById('categoryModal');
    const newCategoryNameInput = document.getElementById('newCategoryName');
    const addCategoryButton = document.getElementById('addCategoryButton');
    // NOVO: Elemento para o tipo da nova categoria
    const newCategoryTypeInput = document.getElementById('newCategoryType'); 
    
    // Elementos da Sidebar
    const themeToggle = document.getElementById('theme-toggle'); 
    
    // Elementos do Calendário (Controles Mestres)
    const calendarGrid = document.getElementById('calendar-grid'); 
    const calendarMonthSelect = document.getElementById('calendar-month-select');
    
    // Elementos do Modal
    const taskModal = document.getElementById('taskModal');
    const tasksList = document.getElementById('tasksList');
    const taskTimeInput = document.getElementById('taskTime');
    const taskDescriptionInput = document.getElementById('taskDescription');
    
    // Elementos do Listas
    const listsContainer = document.getElementById("listsContainer");
    const newListNameInput = document.getElementById("newListName");
    const createListButton = document.getElementById("createListButton"); 


    // Variáveis de Estado
    let monthChart;
    let dataByMonth = {}; 
    let calendarTasks = {};
    
    // Categorias de Receita e Despesa (Agora são mutáveis)
    let revenueCategories = ["salário", "freela", "outros"]; 
    let expenseCategories = [
        "alimentação", "transporte", "moradia", "lazer", "saúde", "educação", "outros"
    ]; 
    
    let currentMonth = null;
    let annualChart;
    let currentCalendarDate = new Date(); 
    let selectedDateKey = null; 
    let editingIndex = null; 
    
    const monthNamesPt = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];

    // ----------------------------------------------------
    // FUNÇÕES DE UTILIDADE E TEMA
    // ----------------------------------------------------
    
    function formatDateToBRL(dateString) {
        if (!dateString || dateString.length !== 10) return dateString;
        const [year, month, day] = dateString.split('-');
        return `${day}/${month}/${year}`;
    }

    function applyTheme(theme) {
        const body = document.body;
        const themeButton = document.getElementById('theme-toggle');
        
        if (theme === 'dark') {
            body.classList.add('dark-mode');
            themeButton.innerHTML = '☀️ tema';
            themeButton.style.background = '#616161'; /* Cinza escuro para botão de tema em dark mode */
            themeButton.style.color = 'white'; 
        } else {
            body.classList.remove('dark-mode');
            themeButton.innerHTML = '🌙 tema';
            themeButton.style.background = '#9E9E9E'; /* Cinza médio vibrante para botão de tema em light mode */
            themeButton.style.color = 'white'; 
        }
        localStorage.setItem('theme', theme);
        
        // Se estiver na seção financeira, redesenha os gráficos
        if (document.getElementById('financeiro-section').style.display !== 'none') {
             renderExpenses(); 
             renderAnnualChart();
        }
    }

    // ----------------------------------------------------
    // PERSISTÊNCIA (localStorage)
    // ----------------------------------------------------
    
    function saveFinancialData() {
        localStorage.setItem('financialData', JSON.stringify(dataByMonth));
        // Salva ambas as listas de categorias
        localStorage.setItem('expenseCategories', JSON.stringify(expenseCategories));
        localStorage.setItem('revenueCategories', JSON.stringify(revenueCategories));
    }

    function loadFinancialData() {
        const savedData = localStorage.getItem('financialData');
        if (savedData) {
            dataByMonth = JSON.parse(savedData);
        } else {
            dataByMonth = {}; 
        }
        
        const savedExpenseCategories = localStorage.getItem('expenseCategories');
        if (savedExpenseCategories) {
            expenseCategories = JSON.parse(savedExpenseCategories);
        }
        
        const savedRevenueCategories = localStorage.getItem('revenueCategories');
        if (savedRevenueCategories) {
            revenueCategories = JSON.parse(savedRevenueCategories);
        }
        
        // Garantir que 'outros' exista como fallback
        if (!expenseCategories.includes('outros')) expenseCategories.push('outros');
        if (!revenueCategories.includes('outros')) revenueCategories.push('outros');
    }
    
    function saveCalendarTasks() {
        localStorage.setItem('calendarTasks', JSON.stringify(calendarTasks));
    }
    
    function loadCalendarTasks() {
        const savedTasks = localStorage.getItem('calendarTasks');
        if (savedTasks) {
            calendarTasks = JSON.parse(savedTasks);
        } else {
            calendarTasks = {};
        }
    }

    function saveLists() {
        const lists = Array.from(listsContainer.querySelectorAll('.list')).map(listDiv => {
            const titleElement = listDiv.querySelector('h2');
            if (!titleElement) return null; 
            
            // Remove o botão 'x' do texto do título antes de salvar
            const listName = Array.from(titleElement.childNodes).filter(node => node.nodeType === 3)[0].textContent.trim();
            
            const items = Array.from(listDiv.querySelectorAll('ul li')).map(li => {
                return {
                    text: li.querySelector('span').textContent,
                    checked: li.querySelector('input[type="checkbox"]').checked
                };
            });
            return { name: listName, items: items };
        }).filter(list => list !== null);
        
        localStorage.setItem('todoLists', JSON.stringify(lists));
    }

    function loadAndRenderLists() {
        listsContainer.innerHTML = '';
        const savedLists = localStorage.getItem('todoLists');
        if (savedLists) {
            const listsData = JSON.parse(savedLists);
            listsData.forEach(listData => {
                createList(listData.name, listData.items);
            });
        }
    }

    // ----------------------------------------------------
    // GERENCIAMENTO DE CATEGORIAS
    // ----------------------------------------------------
    
    function renderCategorySelect(isRevenue = false) {
        const categories = isRevenue ? revenueCategories : expenseCategories;
        
        categoryInput.innerHTML = ''; // Limpa o select
        
        categories.forEach(category => {
            const option = document.createElement('option');
            option.value = category;
            option.textContent = category;
            categoryInput.appendChild(option);
        });
        
        // Lógica de Edição: tenta selecionar a categoria correta se estiver editando
        if (editingIndex !== null && dataByMonth[currentMonth] && dataByMonth[currentMonth][editingIndex]) {
             const item = dataByMonth[currentMonth][editingIndex];
             categoryInput.value = item.category;
        }
    }
    
    function renderCategoryModalList() {
        const expenseContainer = document.getElementById('expense-category-list-container');
        const revenueContainer = document.getElementById('revenue-category-list-container');
        
        expenseContainer.innerHTML = '';
        revenueContainer.innerHTML = '';
        
        // Função auxiliar para renderizar a lista
        const renderList = (categories, container, type) => {
            if (categories.length === 0) {
                container.innerHTML = `<p style="color: #777;">nenhuma categoria de ${type} cadastrada.</p>`;
                return;
            }

            categories.forEach(category => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <span>${category}</span>
                    <button onclick="removeCategory('${category}', '${type}')">remover</button>
                `;
                container.appendChild(div);
            });
        };
        
        renderList(expenseCategories, expenseContainer, 'despesa');
        renderList(revenueCategories, revenueContainer, 'receita');
    }

    window.addCategory = function() {
        const name = newCategoryNameInput.value.trim().toLowerCase();
        const type = newCategoryTypeInput.value; // Pega o tipo selecionado

        if (!name) {
            alert('o nome da categoria é obrigatório.');
            return;
        }
        
        let targetArray = type === 'receita' ? revenueCategories : expenseCategories;
        
        if (targetArray.includes(name)) {
            alert('categoria já existe.');
            return;
        }
        
        // Adiciona ao array correto
        targetArray.push(name);
        
        newCategoryNameInput.value = '';
        saveFinancialData(); 
        
        // Renderiza a lista do modal
        renderCategoryModalList(); 
        
        // Atualiza o select de categoria do formulário (se o tipo atual for o que foi adicionado)
        renderCategorySelect(typeInput.value === 'receita'); 
    }
    
    window.removeCategory = function(category, type) {
        
        if (category === 'outros') {
             alert('a categoria "outros" é reservada e não pode ser removida. ela é usada como fallback.');
             return;
        }

        if (confirm(`tem certeza que deseja remover a categoria "${category}" de ${type}?`)) {
            
            let targetArray = type === 'receita' ? revenueCategories : expenseCategories;
            
            // 1. Remove do array de categorias
            if (targetArray.includes(category)) {
                 targetArray = targetArray.filter(c => c !== category);
                 if (type === 'receita') {
                     revenueCategories = targetArray;
                 } else {
                     expenseCategories = targetArray;
                 }
            } else {
                return;
            }
            
            // 2. Atualiza transações existentes para 'outros'
            Object.keys(dataByMonth).forEach(month => {
                (dataByMonth[month] || []).forEach(item => {
                    // Checa se o item tem o mesmo tipo e categoria que está sendo removida
                    const itemType = item.type || (item.value >= 0 ? 'receita' : 'despesa');
                    if (item.category === category && itemType === type) {
                        item.category = 'outros'; 
                    }
                });
            });
            
            saveFinancialData();
            renderCategorySelect(typeInput.value === 'receita'); // Atualiza o select do formulário
            renderCategoryModalList(); // Atualiza o modal
            renderExpenses(); // Re-renderiza a tabela e gráficos (caso o mês atual seja afetado)
        }
    }
    
    function openCategoryModal() {
        renderCategoryModalList();
        categoryModal.style.display = 'block';
    }
    
    function closeCategoryModal() {
        categoryModal.style.display = 'none';
    }


    // ----------------------------------------------------
    // Funções de Renderização e Lógica Central
    // ----------------------------------------------------

    function renderExpenses() {
      expenseList.innerHTML = '';
      let total = 0;
      let categoryTotals = {}; // Totaus de DESPESAS por categoria

      (dataByMonth[currentMonth] || []).forEach((item, index) => {
        const formattedDate = formatDateToBRL(item.date);
        
        // Usa o campo 'type' se existir, caso contrário tenta deduzir pelo valor
        const transactionType = item.type || (item.value >= 0 ? 'receita' : 'despesa');
        const displayValue = Math.abs(item.value).toFixed(2); 
        const row = document.createElement('tr');
        
        row.innerHTML = `
          <td>${formattedDate}</td> 
          <td>${item.desc}</td>
          <td>${item.category}</td>
          <td style="color: ${transactionType === 'receita' ? '#4CAF50' : '#FF5252'}; font-weight: bold;">${transactionType}</td>
          <td>r$ ${displayValue}</td>
          <td>
            <button class="edit-btn" data-index="${index}">editar</button>
            <button class="delete-btn" data-index="${index}">excluir</button>
          </td>
        `;
        expenseList.appendChild(row);
        
        total += item.value;
        
        // Se for Despesa (valor negativo), soma no total da categoria
        if (item.value < 0) {
            const category = item.category;
            categoryTotals[category] = (categoryTotals[category] || 0) + Math.abs(item.value);
        }
      });
      totalEl.textContent = total.toFixed(2);
      // "saldo total" é o total final
      document.getElementById('total-container').innerHTML = `saldo total: r$ <span id="total" style="color: ${total >= 0 ? '#4CAF50' : '#FF5252'};">${total.toFixed(2)}</span>`;


      // GRÁFICO DO MÊS (Despesas por Categoria)
      const isDarkMode = document.body.classList.contains('dark-mode');
      const textColor = isDarkMode ? '#E0E0E0' : '#333';
        
      const ctx = document.getElementById('month-chart').getContext('2d');
      if (monthChart) monthChart.destroy();
      
      // Filtra categorias com despesa > 0
      const chartLabels = Object.keys(categoryTotals).filter(key => categoryTotals[key] > 0);
      const chartData = chartLabels.map(key => categoryTotals[key]);
      
      // Cores VIVAS Ajustadas para o Gráfico
      const backgroundColors = [
            '#FF5252', '#4CAF50', '#00BCD4', '#9C27B0', '#FFC107', '#FF9800', '#795548'
        ];
      
      monthChart = new Chart(ctx, {
        type: 'pie',
        data: {
          labels: chartLabels,
          datasets: [{
            data: chartData,
            backgroundColor: backgroundColors.slice(0, chartLabels.length)
          }]
        },
        options: {
             plugins: {
                legend: {
                    labels: {
                        color: textColor 
                    }
                }
            }
        }
      });
    }
    
    // NOVO: Função para Excluir (Faltou na resposta anterior)
    window.deleteExpense = function(index) {
        if (confirm("tem certeza que deseja excluir esta transação?")) {
            // Remove o item da lista do mês atual
            dataByMonth[currentMonth].splice(index, 1);
            saveFinancialData();
            renderExpenses(); 
            renderAnnualChart();
        }
    }

    window.editExpense = function(index) {
        editingIndex = index;
        const item = dataByMonth[currentMonth][index];
        const absoluteValue = Math.abs(item.value); 
        
        dateInput.value = item.date;
        descInput.value = item.desc;
        
        typeInput.value = item.type || (item.value >= 0 ? 'receita' : 'despesa'); 
        
        // Renderiza o select de categoria correto com base no tipo
        renderCategorySelect(typeInput.value === 'receita'); 
        
        // Tenta selecionar a categoria do item
        categoryInput.value = item.category;
        valueInput.value = absoluteValue;
        
        // O botão de gerenciar categorias fica sempre visível agora, sem toggle

        descInput.focus();

        submitButton.textContent = 'salvar edição';
        submitButton.style.background = '#4CAF50'; // Verde vibrante para salvar
        submitButton.style.color = 'white'; 

        if (!document.getElementById('cancel-edit-btn')) {
            const cancelButton = document.createElement('button');
            cancelButton.id = 'cancel-edit-btn';
            cancelButton.type = 'button';
            cancelButton.textContent = 'cancelar';
            cancelButton.className = 'add-btn';
            cancelButton.style.background = '#FF9800'; // Laranja vibrante para cancelar
            cancelButton.onclick = cancelEdit;
            // Insere o botão "cancelar" antes do botão "categorias"
            buttonGroup.insertBefore(cancelButton, manageCategoriesBtn);
        }
    }
    
    window.cancelEdit = function() {
        editingIndex = null;
        form.reset(); 
        
        submitButton.textContent = 'adicionar';
        // ALTERAÇÃO 3 (Continuação): Consistência do cor do botão no JS
        submitButton.style.background = '#3586ff'; // NOVO: Azul dos botões principais
        submitButton.style.color = 'white'; 
        
        // Reseta o tipo para despesa (padrão) e renderiza as categorias de despesa
        typeInput.value = 'despesa';
        renderCategorySelect(false);
        // manageCategoriesBtn.style.display = 'block'; // Não é mais necessário

        const cancelButton = document.getElementById('cancel-edit-btn');
        if (cancelButton) {
            cancelButton.remove();
        }
    }


    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const date = dateInput.value;
      const desc = descInput.value;
      const category = categoryInput.value;
      const type = typeInput.value; // Tipo de transação
      let value = parseFloat(valueInput.value);
      
      if (!date || !desc || isNaN(value)) return;
      
      // Lógica de Despesa/Receita: despesa deve ser valor negativo
      if (type === 'despesa') {
          value = -Math.abs(value); 
      } else {
          value = Math.abs(value); 
      }
      
      const monthIndex = new Date(date + 'T12:00:00').getMonth(); 
      const expenseMonth = monthNamesPt[monthIndex];
      
      const newItem = { date, desc, category, type, value }; 

      if (editingIndex !== null && currentMonth === expenseMonth) {
          dataByMonth[currentMonth][editingIndex] = newItem; 
          cancelEdit(); 
      } else {
          if (!dataByMonth[expenseMonth]) dataByMonth[expenseMonth] = [];
          dataByMonth[expenseMonth].push(newItem); 
          form.reset(); 
      }

      saveFinancialData(); 

      if (currentMonth === expenseMonth) {
         renderExpenses();
         renderAnnualChart(); 
      }
      
      updateMonthlyView();
    });
    
    /**
     * Função para mostrar apenas a seção selecionada dentro da página Mensal.
     */
    function showMensalSection(sectionId) {
        // Esconde todas as seções
        document.querySelectorAll('.mensal-content-section').forEach(section => {
            section.style.display = 'none';
        });
        // Mostra a seção desejada
        document.getElementById(sectionId).style.display = 'block';

        // Atualiza o estado ativo dos botões de navegação
        document.querySelectorAll('.mensal-sub-toggle').forEach(btn => {
            btn.classList.remove('active-sub');
        });
        document.getElementById(`show-${sectionId.replace('-section', '')}`).classList.add('active-sub');
        
        // Garante que o modo edição seja cancelado ao sair da seção financeira
        if (sectionId !== 'financeiro-section') {
            cancelEdit();
        }


        // Renderiza o conteúdo necessário
        if (sectionId === 'financeiro-section') {
            renderExpenses();
            renderAnnualChart(); 
            // Garante que a categoria correta seja exibida ao entrar na seção
            renderCategorySelect(typeInput.value === 'receita');
        }
        if (sectionId === 'listas-section') {
            loadAndRenderLists();
        }
        if (sectionId === 'planner-section') {
             renderCalendar(currentCalendarDate); 
        }
    }


    /**
     * Atualiza todas as views da página Mensal com base na data atual do calendário.
     */
    function updateMonthlyView() {
        const year = currentCalendarDate.getFullYear();
        const monthIndex = currentCalendarDate.getMonth();
        const currentMonthName = monthNamesPt[monthIndex];
        
        // 1. Atualiza a variável mestra de mês para o Financeiro
        currentMonth = currentMonthName; 
        
        // 2. Atualiza o seletor de mês/ano na UI e no título
        calendarMonthSelect.value = monthIndex;
        document.getElementById('mensal-page-title').textContent = `📝 OrganizatIO 📝`;

        // Define a data do input de despesa para o primeiro dia do mês selecionado
        const monthString = String(monthIndex + 1).padStart(2, '0');
        const defaultDate = `${year}-${monthString}-01`;
        document.getElementById('date').value = defaultDate;

        // 3. Inicia a view: Atualiza o título e mostra a seção Planner por padrão
        let activeSectionId = 'planner-section';
        const activeToggle = document.querySelector('.mensal-sub-toggle.active-sub');
        if (activeToggle) {
             activeSectionId = activeToggle.id.replace('show-', '') + '-section';
        }
        showMensalSection(activeSectionId);
    }

    // Função para gerar o gráfico anual (Total de Despesas Mensais)
    function renderAnnualChart() {
        const isDarkMode = document.body.classList.contains('dark-mode');
        const gridColor = isDarkMode ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.1)';
        const textColor = isDarkMode ? '#E0E0E0' : '#333';
        
        const monthlyExpenses = monthNamesPt.map(m => {
            const monthData = dataByMonth[m] || [];
            // Calcula SÓ as despesas (valores negativos)
            const totalExpense = monthData.filter(item => item.value < 0)
                                           .reduce((acc, item) => acc + Math.abs(item.value), 0);
            return totalExpense.toFixed(2); // Valor absoluto
        });
        
        if (annualChart) annualChart.destroy();
        const ctx = document.getElementById('annual-chart').getContext('2d');
        annualChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: monthNamesPt,
                datasets: [{
                    label: 'total de despesas (r$)', 
                    data: monthlyExpenses,
                    // Cor VIVAS para Despesas -> Vermelho vibrante
                    backgroundColor: '#FF5252' 
                }]
            },
            options: { 
                scales: { 
                    y: { 
                        beginAtZero: true,
                        ticks: { color: textColor },
                        grid: { color: gridColor }
                    },
                    x: {
                        ticks: { color: textColor },
                        grid: { color: gridColor }
                    }
                },
                plugins: {
                    legend: {
                        labels: {
                            color: textColor
                        }
                    }
                }
            }
        });
        // Atualiza o título do gráfico
        document.querySelector('#annual-chart-container h3').textContent = 'comparativo anual';
    }

    function initCalendarSelect() {
        if (calendarMonthSelect.options.length === 0) {
             monthNamesPt.forEach((month, index) => {
                const option = document.createElement('option');
                option.value = index; 
                option.textContent = month;
                calendarMonthSelect.appendChild(option);
            });
        }
    }
    
    function renderCalendar(date) {
      calendarGrid.innerHTML = `
        <div class="calendar-day-name">dom</div>
        <div class="calendar-day-name">seg</div>
        <div class="calendar-day-name">ter</div>
        <div class="calendar-day-name">qua</div>
        <div class="calendar-day-name">qui</div>
        <div class="calendar-day-name">sex</div>
        <div class="calendar-day-name">sáb</div>
      `; 

      const year = date.getFullYear();
      const month = date.getMonth();
      
      calendarMonthSelect.value = month;

      const firstDayOfMonth = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();
      
      // Dias Inativos Anteriores
      for (let i = firstDayOfMonth; i > 0; i--) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day inactive';
        dayDiv.innerHTML = `<span class="calendar-day-number">${daysInPrevMonth - i + 1}</span>`;
        calendarGrid.appendChild(dayDiv);
      }

      // Dias Ativos do Mês
      for (let day = 1; day <= daysInMonth; day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day';
        dayDiv.innerHTML = `<span class="calendar-day-number">${day}</span>`;
        
        const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        
        dayDiv.addEventListener('click', () => {
            openTaskModal(dateKey, day);
        });

        // Exibe as tarefas salvas
        const tasks = calendarTasks[dateKey] || [];
        if (tasks.length > 0) {
            dayDiv.style.border = '2px solid #a572ff'; /* Roxo escuro vibrante para borda do dia com tarefa */
            tasks.slice(0, 2).forEach(task => { 
                const taskEl = document.createElement('div');
                taskEl.className = 'task-indicator';
                taskEl.textContent = `${task.time} - ${task.description}`;
                dayDiv.appendChild(taskEl);
            });
            if (tasks.length > 2) {
                 const moreEl = document.createElement('div');
                 moreEl.className = 'task-indicator';
                 moreEl.style.background = '#FF1744'; /* Vermelho vibrante para "mais tarefas" */
                 moreEl.textContent = `+${tasks.length - 2} mais`;
                 dayDiv.appendChild(moreEl);
            }
        }
        
        const today = new Date();
        if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
            dayDiv.style.border = '2px solid #e3e3e3'; /* Cinza para o dia atual */
        }

        calendarGrid.appendChild(dayDiv);
      }

      // Dias Inativos Posteriores
      const totalDays = firstDayOfMonth + daysInMonth;
      const totalSlots = Math.ceil(totalDays / 7) * 7;
      const remainingSlots = totalSlots - totalDays;
      
      for (let i = 1; i <= remainingSlots; i++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day inactive';
        dayDiv.innerHTML = `<span class="calendar-day-number">${i}</span>`;
        calendarGrid.appendChild(dayDiv);
      }
    }


    function openTaskModal(dateKey, day) {
        selectedDateKey = dateKey;
        
        renderDayTasks();
        
        taskModal.style.display = 'block';
    }

    window.closeTaskModal = function() {
        taskModal.style.display = 'none';
        renderCalendar(currentCalendarDate); 
    }

    function renderDayTasks() {
        tasksList.innerHTML = '';
        const tasks = calendarTasks[selectedDateKey] || [];
        
        tasks.sort((a, b) => (a.time > b.time) ? 1 : -1);

        if (tasks.length === 0) {
            tasksList.innerHTML = '<p style="text-align: center; color: #777;">nenhuma tarefa agendada.</p>';
            return;
        }

        tasks.forEach((task, index) => {
            const taskItem = document.createElement('div');
            taskItem.className = 'task-list-item';
            taskItem.innerHTML = `
                <span><strong>${task.time}</strong> - ${task.description}</span>
                <button onclick="removeTask(${index})">remover</button>
            `;
            tasksList.appendChild(taskItem);
        });
    }

    window.addTask = function() {
        const time = taskTimeInput.value;
        const description = taskDescriptionInput.value.trim(); 

        if (!time || !description) {
            alert('Por favor, preencha o horário e a descrição da tarefa.');
            return;
        }

        if (!calendarTasks[selectedDateKey]) {
            calendarTasks[selectedDateKey] = [];
        }

        calendarTasks[selectedDateKey].push({ time, description });
        
        taskDescriptionInput.value = '';
        
        saveCalendarTasks();
        renderDayTasks();
    }

    window.removeTask = function(index) {
        if (calendarTasks[selectedDateKey]) {
            calendarTasks[selectedDateKey].splice(index, 1);
            
            if (calendarTasks[selectedDateKey].length === 0) {
                delete calendarTasks[selectedDateKey];
            }

            saveCalendarTasks();
            renderDayTasks();
        }
    }
    
    window.createList = function(initialName, initialItems = []) {
      
      let listName = initialName;
      let fromInput = false;

      if (initialName === undefined) {
          listName = newListNameInput.value.trim().toLowerCase(); 
          if (!listName) return;
          newListNameInput.value = "";
          fromInput = true;
      }
      
      const listDiv = document.createElement("div");
      listDiv.className = "list";
      const title = document.createElement("h2");
      title.textContent = listName + ' '; 
      
      // ALTERAÇÃO 2: Usa a nova classe de botão circular
      const removeBtn = document.createElement("button");
      removeBtn.textContent = "x";
      removeBtn.className = "delete-list-circular-btn"; 
      removeBtn.onclick = () => {
        listDiv.remove();
        saveLists(); 
      };
      
      title.appendChild(removeBtn); 
      
      // NOVO: Wrapper para Input e Botão de Adicionar Item
      const inputGroup = document.createElement("div");
      inputGroup.className = "list-input-group";
      
      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = "novo item";
      
      const addBtn = document.createElement("button");
      addBtn.textContent = "adicionar";
      addBtn.className = "add-btn";
      
      const ul = document.createElement("ul");
      
      const addItem = (text, checked = false) => {
          const li = document.createElement("li");
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = checked;

          checkbox.onchange = () => {
              checkCompletion(listDiv); 
              saveLists(); 
          };
          
          const span = document.createElement("span");
          span.textContent = text;
          
          li.appendChild(checkbox);
          li.appendChild(span);
          ul.appendChild(li);
      };

      addBtn.onclick = () => {
        const text = input.value.trim();
        if (!text) return;
        input.value = "";
        addItem(text);
        checkCompletion(listDiv); 
        saveLists(); 
      };
      
      listDiv.appendChild(title);
      // Adiciona o Input e o Botão ao grupo
      inputGroup.appendChild(input);
      inputGroup.appendChild(addBtn);
      // Adiciona o grupo à lista
      listDiv.appendChild(inputGroup);
      
      listDiv.appendChild(ul);
      listsContainer.appendChild(listDiv);

      initialItems.forEach(item => addItem(item.text, item.checked));

      checkCompletion(listDiv); 
      if (fromInput) {
        saveLists(); 
      }
    }

    // Função que aplica/remove a classe 'completed'
    function checkCompletion(listDiv) {
      const checkboxes = listDiv.querySelectorAll("ul li input[type='checkbox']");
      
      if (checkboxes.length === 0) {
        listDiv.classList.remove("completed"); 
        return;
      }
      
      const allChecked = Array.from(checkboxes).every(cb => cb.checked);
      
      if (allChecked) {
        listDiv.classList.add("completed");
      } else {
        listDiv.classList.remove("completed");
      }
    }
    
    // ----------------------------------------------------\
    // Conexão dos Listeners 
    // ----------------------------------------------------\

    themeToggle.addEventListener('click', () => { 
        const isCurrentlyDark = document.body.classList.contains('dark-mode');
        const newTheme = isCurrentlyDark ? 'light' : 'dark';
        applyTheme(newTheme);
    });
    
    // Event Delegation para botões de Editar/Excluir na Tabela Financeira
    expenseList.addEventListener('click', function(e) {
        const index = e.target.getAttribute('data-index');
        if (e.target.classList.contains('edit-btn')) {
            window.editExpense(parseInt(index));
        } else if (e.target.classList.contains('delete-btn')) {
            window.deleteExpense(parseInt(index));
        }
    });

    createListButton.addEventListener('click', () => {
        createList();
    });
    
    // Listener para o campo TIPO de transação
    typeInput.addEventListener('change', (e) => {
        const isRevenue = e.target.value === 'receita';
        renderCategorySelect(isRevenue);
        // O botão de gerenciar categorias fica sempre visível
    });


    // LISTENERS DE NAVEGAÇÃO INTERNA DA PÁGINA MENSAL
    document.getElementById('show-planner').addEventListener('click', () => showMensalSection('planner-section'));
    document.getElementById('show-financeiro').addEventListener('click', () => showMensalSection('financeiro-section'));
    document.getElementById('show-listas').addEventListener('click', () => showMensalSection('listas-section'));


    // LISTENERS DE CATEGORIAS
    manageCategoriesBtn.addEventListener('click', openCategoryModal); 
    addCategoryButton.addEventListener('click', addCategory);
    newCategoryNameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addCategory();
    });

    // LISTENER DO CONTROLE MESTRE DE DATA
    calendarMonthSelect.addEventListener('change', (e) => {
        const newMonth = parseInt(e.target.value);
        currentCalendarDate.setMonth(newMonth);
        updateMonthlyView();
    });
    
    // Fechar modais ao clicar fora
    window.onclick = function(event) {
        if (event.target == taskModal) {
            closeTaskModal();
        }
        if (event.target == categoryModal) {
            closeCategoryModal();
        }
    }
    
    // ----------------------------------------------------\
    // Inicialização da Aplicação
    // ----------------------------------------------------\
    
    function initApp() {
        // 1. Carregar todos os dados do LocalStorage
        loadFinancialData();
        loadAndRenderLists();
        loadCalendarTasks(); 
        
        // 1.1. Carregar e aplicar o tema do usuário
        const savedTheme = localStorage.getItem('theme') || 'light';
        applyTheme(savedTheme);
        
        // 2. Definir o mês/ano atual para o controle mestre
        currentCalendarDate = new Date();
        
        // 3. Inicializar o seletor de mês e categorias (inicia como Despesa)
        initCalendarSelect();
        renderCategorySelect(false); 

        // 4. Inicia a view: Atualiza o título e mostra a seção Planner por padrão
        updateMonthlyView();
    }

    // Chamar a função de inicialização ao carregar o script
    initApp();
  </script>
</body>
</html>
