<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>controle financeiro</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #444;
      display: flex;
      height: 100vh;
      margin: 0;
    }
    .sidebar {
      width: 220px;
      background: #fff;
      padding: 20px;
      border-right: 2px solid #ddd;
      display: flex;
      flex-direction: column;
      gap: 10px;
      
    }
    .sidebar button {
      background: #3498db;
      border: none;
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
      text-align: left;
      text-transform: lowercase;
      color: white;
    }
    .sidebar button:hover,
    .sidebar button.active {
      background: #2980b9;
    }
    .submenu {
      display: none;
      flex-direction: column;
      margin-left: 10px;
      gap: 5px;
    }
    .submenu button {
      background: #5dade2;
      font-size: 13px;
    }
    .submenu.show {
      display: flex;
    }
    .container {
      flex: 1;
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin: 20px;
      padding: 20px;
      overflow-y: auto;
    }
    h1 {
      text-align: center;
      color: #444;
      margin-bottom: 20px;
      text-transform: lowercase;
    }
    form {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 20px;
    }
    input, select, button {
      padding: 8px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
      text-transform: lowercase;
    }
    button.add-btn {
      background: #3498db;
      border: none;
      cursor: pointer;
      color: white;
      transition: 0.2s;
    }
    button.add-btn:hover {
      background: #2980b9;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-transform: lowercase;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }
    th {
      background: #ddd;
      color: #333;
    }
    tr:hover {
      background: #f9f9f9;
    }
    .total {
      text-align: right;
      font-weight: bold;
      margin-top: 10px;
      color: #444;
    }
    .delete-btn {
      background: #e74c3c;
      border: none;
      border-radius: 8px;
      padding: 5px 10px;
      cursor: pointer;
      transition: 0.2s;
      color: white;
    }
    .delete-btn:hover {
      background: #c0392b;
    }
    #chart-container, #month-chart-container {
      width: 100%;
      max-width: 600px;
      margin: 20px auto;
    }
    #chart-container {
      display: none;
    }

    /* estilos para gerenciador de listas */
    .new-list {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
      gap: 10px;
    }
    .lists-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: flex-start;
    }
    .list {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      width: 250px;
      transition: opacity 0.3s ease;
      flex-shrink: 0;
    }
    .list.completed {
      opacity: 0.5;
    }
    .list h2 {
      margin-top: 0;
      font-size: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .list h2 button {
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      padding: 2px 6px;
    }
    .list input[type="text"] {
      width: calc(100% - 90px);
      padding: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    .list button.add {
      padding: 5px 8px;
      margin-left: 5px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #3498db;
      color: white;
    }
    ul {
      list-style: none;
      padding: 0;
      margin-top: 10px;
    }
    li {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }
    li input[type="checkbox"] {
      margin-right: 10px;
    }
    
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="sidebar">
    <button id="inicio-toggle" class="active">início</button>
    <button id="calendario-toggle">calendário</button>
    <button id="months-toggle">financeiro ▾</button>
    <div class="submenu" id="months-submenu">
      <button class="month-btn" data-month="janeiro">janeiro</button>
      <button class="month-btn" data-month="fevereiro">fevereiro</button>
      <button class="month-btn" data-month="março">março</button>
      <button class="month-btn" data-month="abril">abril</button>
      <button class="month-btn" data-month="maio">maio</button>
      <button class="month-btn" data-month="junho">junho</button>
      <button class="month-btn" data-month="julho">julho</button>
      <button class="month-btn" data-month="agosto">agosto</button>
      <button class="month-btn" data-month="setembro">setembro</button>
      <button class="month-btn" data-month="outubro">outubro</button>
      <button class="month-btn" data-month="novembro">novembro</button>
      <button class="month-btn" data-month="dezembro">dezembro</button>
    </div>
    <button id="listas-toggle">listas</button>
    
  </div>

  <div class="container">
    <!-- início -->
    <div id="inicio-page">
      <h1 id="page-title">comparativo anual</h1>
      <form id="expense-form" style="display: none;">
        <input type="date" id="date" required>
        <input type="text" id="desc" placeholder="descrição" required>
        <select id="category">
          <option>alimentação</option>
          <option>transporte</option>
          <option>moradia</option>
          <option>lazer</option>
          <option>outros</option>
        </select>
        <input type="number" id="value" placeholder="r$" step="0.01" required>
        <button type="submit" class="add-btn">adicionar</button>
      </form>
      <table id="expense-table" style="display: none;">
        <thead>
          <tr>
            <th>data</th>
            <th>descrição</th>
            <th>categoria</th>
            <th>valor (r$)</th>
            <th>ações</th>
          </tr>
        </thead>
        <tbody id="expense-list"></tbody>
      </table>
      <div class="total" id="total-container" style="display: none;">
        total: r$ <span id="total">0.00</span>
      </div>
      <div id="month-chart-container" style="display: none;">
        <canvas id="month-chart"></canvas>
      </div>
      <div id="chart-container">
        <canvas id="annual-chart"></canvas>
      </div>
    </div>

<!-- calendário -->
<div id="calendario-page" style="display: none;">
  <h1>planner mensal</h1>
  <div id="calendar"></div>
</div>

    <!-- listas -->
    <div id="listas-page" style="display: none;">
      <h1>gerenciador de listas</h1>
      <div class="new-list">
        <input type="text" id="newListName" placeholder="Nome da nova lista">
        <button onclick="createList()">Criar Lista</button>
      </div>
      <div class="lists-container" id="listsContainer"></div>
    </div>

</div>
  </div>

  <script>
    const form = document.getElementById('expense-form');
    const expenseList = document.getElementById('expense-list');
    const totalEl = document.getElementById('total');
    const pageTitle = document.getElementById('page-title');
    const monthButtons = document.querySelectorAll('.month-btn');
    const monthsToggle = document.getElementById('months-toggle');
    const monthsSubmenu = document.getElementById('months-submenu');
    const inicioToggle = document.getElementById('inicio-toggle');
    const listasToggle = document.getElementById('listas-toggle');
    const expenseTable = document.getElementById('expense-table');
    const chartContainer = document.getElementById('chart-container');
    const totalContainer = document.getElementById('total-container');
    const monthChartContainer = document.getElementById('month-chart-container');
    const inicioPage = document.getElementById('inicio-page');
    const listasPage = document.getElementById('listas-page');
    let monthChart;
    let dataByMonth = {};
    let currentMonth = null;
    let annualChart;

    function renderExpenses() {
      expenseList.innerHTML = '';
      let total = 0;
      let categoryTotals = {};

      (dataByMonth[currentMonth] || []).forEach((item, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.date}</td>
          <td>${item.desc}</td>
          <td>${item.category}</td>
          <td>r$ ${item.value.toFixed(2)}</td>
          <td><button class="delete-btn" data-index="${index}">excluir</button></td>
        `;
        expenseList.appendChild(row);
        total += item.value;
        categoryTotals[item.category] = (categoryTotals[item.category] || 0) + item.value;
      });
      totalEl.textContent = total.toFixed(2);

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = e.target.getAttribute('data-index');
          dataByMonth[currentMonth].splice(idx, 1);
          renderExpenses();
        });
      });

      const ctx = document.getElementById('month-chart').getContext('2d');
      if (monthChart) monthChart.destroy();
      monthChart = new Chart(ctx, {
        type: 'pie',
        data: {
          labels: Object.keys(categoryTotals),
          datasets: [{
            data: Object.values(categoryTotals),
            backgroundColor: ['#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22']
          }]
        }
      });
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const date = document.getElementById('date').value;
      const desc = document.getElementById('desc').value;
      const category = document.getElementById('category').value;
      const value = parseFloat(document.getElementById('value').value);
      if (!date || !desc || isNaN(value)) return;
      if (!dataByMonth[currentMonth]) dataByMonth[currentMonth] = [];
      dataByMonth[currentMonth].push({ date, desc, category, value });
      renderExpenses();
      form.reset();
    });

    monthButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        monthButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        inicioToggle.classList.remove('active');
        listasToggle.classList.remove('active');
        inicioPage.style.display = '';
        listasPage.style.display = 'none';
        currentMonth = btn.dataset.month;
        pageTitle.textContent = `🌸 ${currentMonth} 🌸`;
        expenseTable.style.display = '';
        form.style.display = 'grid';
        chartContainer.style.display = 'none';
        totalContainer.style.display = 'block';
        monthChartContainer.style.display = 'block';
        renderExpenses();
      });
    });

    monthsToggle.addEventListener('click', () => {
      monthsSubmenu.classList.toggle('show');
    });

    inicioToggle.addEventListener('click', () => {
      inicioToggle.classList.add('active');
      listasToggle.classList.remove('active');
      monthButtons.forEach(b => b.classList.remove('active'));
      inicioPage.style.display = '';
      listasPage.style.display = 'none';
      pageTitle.textContent = '🌸 comparativo anual 🌸';
      expenseTable.style.display = 'none';
      form.style.display = 'none';
      totalContainer.style.display = 'none';
      monthChartContainer.style.display = 'none';
      chartContainer.style.display = 'block';

      const monthNames = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
      const totals = monthNames.map(m => (dataByMonth[m] || []).reduce((acc, item) => acc + item.value, 0));
      if (annualChart) annualChart.destroy();
      const ctx = document.getElementById('annual-chart').getContext('2d');
      annualChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: monthNames,
          datasets: [{
            label: 'gastos (r$)',
            data: totals,
            backgroundColor: ['#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22','#1abc9c','#e74c3c','#95a5a6','#d35400','#7f8c8d','#f39c12','#8e44ad']
          }]
        },
        options: { scales: { y: { beginAtZero: true } } }
      });
    });

    listasToggle.addEventListener('click', () => {
      listasToggle.classList.add('active');
      inicioToggle.classList.remove('active');
      monthButtons.forEach(b => b.classList.remove('active'));
      inicioPage.style.display = 'none';
      listasPage.style.display = '';
    });

    // funções do gerenciador de listas
    function createList() {
      const nameInput = document.getElementById("newListName");
      const listName = nameInput.value.trim();
      if (!listName) return;
      nameInput.value = "";
      const container = document.getElementById("listsContainer");
      const listDiv = document.createElement("div");
      listDiv.className = "list";
      const title = document.createElement("h2");
      title.textContent = listName;
      const removeBtn = document.createElement("button");
      removeBtn.textContent = "X";
      removeBtn.onclick = () => listDiv.remove();
      title.appendChild(removeBtn);
      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = "Novo item";
      const addBtn = document.createElement("button");
      addBtn.textContent = "Adicionar";
      addBtn.className = "add";
      const ul = document.createElement("ul");
      addBtn.onclick = () => {
        const text = input.value.trim();
        if (!text) return;
        input.value = "";
        const li = document.createElement("li");
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.onchange = () => checkCompletion(listDiv);
        const span = document.createElement("span");
        span.textContent = text;
        li.appendChild(checkbox);
        li.appendChild(span);
        ul.appendChild(li);
        checkCompletion(listDiv);
      };
      listDiv.appendChild(title);
      listDiv.appendChild(input);
      listDiv.appendChild(addBtn);
      listDiv.appendChild(ul);
      container.appendChild(listDiv);
    }

    function checkCompletion(listDiv) {
      const checkboxes = listDiv.querySelectorAll("ul li input[type='checkbox']");
      if (checkboxes.length > 0 && Array.from(checkboxes).every(cb => cb.checked)) {
        listDiv.classList.add("completed");
      } else {
        listDiv.classList.remove("completed");
      }
    }

    // abrir "início" ao carregar
    inicioToggle.click();
  </script>
</body>
</html>
