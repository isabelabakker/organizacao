<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planner e Controle Financeiro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ---------------- Global ---------------- */
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg-color, #fff8e7);
      color: var(--text-color, #444);
    }
    header {
      display: flex;
      justify-content: space-around;
      background: #fbeaff;
      padding: 10px 0;
      border-bottom: 2px solid #f0d8ff;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header button {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: #6a4c93;
      font-weight: bold;
    }
    header button.active {
      color: #fff;
      background: #fcbad3;
      border-radius: 10px;
      padding: 5px 10px;
    }
    section {
      display: none;
      padding: 20px;
    }
    section.active {
      display: block;
    }

    /* ---------------- Planner ---------------- */
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      font-weight: bold;
      text-align: center;
      margin-bottom: 5px;
    }
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }
    .day {
      background: #ffe6f2;
      border: 1px solid #f0d8ff;
      border-radius: 8px;
      padding: 15px 0;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .day:hover {
      background: #fcbad3;
      color: white;
    }

    /* ---------------- Modal ---------------- */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .modal-content h3 {
      margin-top: 0;
      text-align: center;
    }
    .modal-content input, .modal-content button {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ddd;
    }
    .modal-content button {
      background: #ffd6e8;
      border: none;
      cursor: pointer;
    }
    .modal-content button:hover {
      background: #fcbad3;
      color: white;
    }

    /* ---------------- Financeiro ---------------- */
    form {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 5px;
      margin-bottom: 15px;
    }
    form input, form select, form button {
      padding: 8px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-transform: lowercase;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }
    th {
      background: #e0d4f7;
      color: #4b3b6b;
    }

    /* ---------------- Config ---------------- */
    .config-option {
      margin: 10px 0;
    }
  </style>
</head>
<body>

  <!-- ---------------- Navegação ---------------- -->
  <header>
    <button class="active" onclick="showSection('planner')">Planner</button>
    <button onclick="showSection('financeiro')">Financeiro</button>
    <button onclick="showSection('config')">Configurações</button>
  </header>

  <!-- ---------------- Planner ---------------- -->
  <section id="planner" class="active">
    <h2>Planner Mensal</h2>
    <div class="weekdays">
      <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
    </div>
    <div class="calendar" id="calendar"></div>
  </section>

  <!-- ---------------- Financeiro ---------------- -->
  <section id="financeiro">
    <h2>Controle Financeiro</h2>
    <form id="financeForm">
      <input type="text" id="desc" placeholder="Descrição" required>
      <input type="number" id="valor" placeholder="Valor" step="0.01" required>
      <select id="tipo">
        <option value="receita">Receita</option>
        <option value="despesa">Despesa</option>
      </select>
      <button type="submit">Adicionar</button>
    </form>
    <table>
      <thead>
        <tr><th>Descrição</th><th>Valor</th><th>Tipo</th></tr>
      </thead>
      <tbody id="financeTable"></tbody>
    </table>
    <h3>Saldo: R$ <span id="saldo">0.00</span></h3>
  </section>

  <!-- ---------------- Configurações ---------------- -->
  <section id="config">
    <h2>Configurações</h2>
    <div class="config-option">
      <label>Cor de fundo: </label>
      <input type="color" id="bgColorPicker" value="#fff8e7">
    </div>
    <div class="config-option">
      <label>Cor do texto: </label>
      <input type="color" id="textColorPicker" value="#444444">
    </div>
    <div class="config-option">
      <label>Cor dos dias do planner: </label>
      <input type="color" id="dayColorPicker" value="#ffe6f2">
    </div>
  </section>

  <!-- ---------------- Modal de tarefas ---------------- -->
  <div class="modal" id="taskModal">
    <div class="modal-content">
      <h3 id="taskTitle"></h3>
      <ul id="taskList"></ul>
      <input type="text" id="newTaskInput" placeholder="Nova tarefa">
      <button onclick="addTask()">Adicionar Tarefa</button>
      <button onclick="closeModal()">Fechar</button>
    </div>
  </div>

  <script>
    // ---------------- Navegação ----------------
    function showSection(id) {
      document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      document.querySelectorAll("header button").forEach(btn => btn.classList.remove("active"));
      document.querySelector(`header button[onclick*="${id}"]`).classList.add("active");
    }

    // ---------------- Planner ----------------
    const calendar = document.getElementById("calendar");
    let tasks = JSON.parse(localStorage.getItem("tasks")) || {};
    const today = new Date();
    const monthDays = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();

    for (let i = 1; i <= monthDays; i++) {
      const day = document.createElement("div");
      day.classList.add("day");
      day.textContent = i;
      day.onclick = () => openModal(i);
      calendar.appendChild(day);
    }

    let currentDay = null;
    function openModal(day) {
      currentDay = day;
      document.getElementById("taskTitle").textContent = "Tarefas do dia " + day;
      renderTasks();
      document.getElementById("taskModal").style.display = "flex";
    }
    function closeModal() { document.getElementById("taskModal").style.display = "none"; }

    function addTask() {
      const input = document.getElementById("newTaskInput");
      const task = input.value.trim();
      if(task){
        if(!tasks[currentDay]) tasks[currentDay] = [];
        tasks[currentDay].push(task);
        localStorage.setItem("tasks", JSON.stringify(tasks));
        input.value = "";
        renderTasks();
      }
    }
    function renderTasks() {
      const list = document.getElementById("taskList");
      list.innerHTML = "";
      if(tasks[currentDay]){
        tasks[currentDay].forEach((t,i)=>{
          const li = document.createElement("li");
          li.textContent = t;
          li.onclick = () => { tasks[currentDay].splice(i,1); localStorage.setItem("tasks", JSON.stringify(tasks)); renderTasks(); };
          list.appendChild(li);
        });
      }
    }

    // ---------------- Financeiro ----------------
    const financeForm = document.getElementById("financeForm");
    const financeTable = document.getElementById("financeTable");
    const saldoSpan = document.getElementById("saldo");
    let saldo = parseFloat(localStorage.getItem("saldo")) || 0;
    let registros = JSON.parse(localStorage.getItem("registros")) || [];

    function atualizarFinanceiro() {
      financeTable.innerHTML = "";
      registros.forEach(r=>{
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${r.desc}</td><td>R$ ${r.valor.toFixed(2)}</td><td>${r.tipo}</td>`;
        financeTable.appendChild(tr);
      });
      saldoSpan.textContent = saldo.toFixed(2);
      localStorage.setItem("saldo", saldo);
      localStorage.setItem("registros", JSON.stringify(registros));
    }

    financeForm.onsubmit = (e)=>{
      e.preventDefault();
      const desc = document.getElementById("desc").value;
      const valor = parseFloat(document.getElementById("valor").value);
      const tipo = document.getElementById("tipo").value;

      if(tipo==="receita") saldo+=valor;
      else saldo-=valor;

      registros.push({desc,valor,tipo});
      atualizarFinanceiro();
      financeForm.reset();
    };
    atualizarFinanceiro();

    // ---------------- Configurações ----------------
    const bgColorPicker = document.getElementById("bgColorPicker");
    const textColorPicker = document.getElementById("textColorPicker");
    const dayColorPicker = document.getElementById("dayColorPicker");

    function aplicarCores(){
      document.body.style.setProperty("--bg-color", localStorage.getItem("bgColor")||"#fff8e7");
      document.body.style.setProperty("--text-color", localStorage.getItem("textColor")||"#444");
      document.querySelectorAll(".day").forEach(d=>{
        d.style.background = localStorage.getItem("dayColor")||"#ffe6f2";
      });
    }

    bgColorPicker.oninput = e => { localStorage.setItem("bgColor", e.target.value); aplicarCores(); };
    textColorPicker.oninput = e => { localStorage.setItem("textColor", e.target.value); aplicarCores(); };
    dayColorPicker.oninput = e => { localStorage.setItem("dayColor", e.target.value); aplicarCores(); };

    // Restaurar cores ao carregar
    aplicarCores();
  </script>
</body>
</html>
